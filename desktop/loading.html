<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Frieren Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="renderer/styles/loading.css">
</head>
<body>

<canvas id="snow-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div class="nebula"></div>
<div class="constellation"></div>
<div class="deco-top"></div>
<div class="deco-bottom"></div>

<div class="stage">
    <div class="orb-wrap">

        <!-- 🌙 CRESCENT — SVG arc, always visible -->
        <svg class="crescent-svg" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Outer arc: gold → teal → gold sweep over ~200° -->
                <linearGradient id="cg-outer" x1="0%" y1="0%" x2="100%" y2="0%"
                                gradientUnits="userSpaceOnUse">
                    <stop offset="0%"   stop-color="#f0d070" stop-opacity="0"/>
                    <stop offset="18%"  stop-color="#d1aa3a" stop-opacity="0.9"/>
                    <stop offset="42%"  stop-color="#f0d070" stop-opacity="1"/>
                    <stop offset="62%"  stop-color="#6cd4bc" stop-opacity="0.9"/>
                    <stop offset="82%"  stop-color="#f0d070" stop-opacity="0.7"/>
                    <stop offset="100%" stop-color="#f0d070" stop-opacity="0"/>
                </linearGradient>
                <!-- Inner arc: softer echo -->
                <linearGradient id="cg-inner" x1="0%" y1="0%" x2="100%" y2="0%"
                                gradientUnits="userSpaceOnUse">
                    <stop offset="0%"   stop-color="#f0d070" stop-opacity="0"/>
                    <stop offset="25%"  stop-color="#f0d070" stop-opacity="0.45"/>
                    <stop offset="55%"  stop-color="#6cd4bc" stop-opacity="0.40"/>
                    <stop offset="80%"  stop-color="#f0d070" stop-opacity="0.25"/>
                    <stop offset="100%" stop-color="#f0d070" stop-opacity="0"/>
                </linearGradient>
                <!-- Glow filter -->
                <filter id="arc-glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="2.5" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>

            <!-- Outer glowing arc ~200° (top and sides, open at bottom) -->
            <!-- cx=90 cy=90 r=85 — startAngle=-260° endAngle=80° clockwise -->
            <path
                    d="M 17.2 119.5
                   A 85 85 0 1 1 162.8 119.5"
                    stroke="url(#cg-outer)"
                    stroke-width="2"
                    stroke-linecap="round"
                    filter="url(#arc-glow)"
            />
            <!-- Inner softer echo arc, slightly smaller -->
            <path
                    d="M 23.5 114.0
                   A 76 76 0 1 1 156.5 114.0"
                    stroke="url(#cg-inner)"
                    stroke-width="1"
                    stroke-linecap="round"
            />
        </svg>

        <div class="brand-orb"></div>
    </div>

    <div class="brand-title">Frieren Anime Archive</div>
    <div class="brand-sub">Celestial Archive</div>
    <div class="progress-track">
        <div class="progress-bar"></div>
    </div>
    <div class="status-text">Summoning the archive…</div>
</div>

<script src="renderer/js/loadingSCRN.js"></script>
</body>
</html>
