<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Frieren Archive</title>
  <style>
    * { box-sizing: border-box; }
    body
    {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0ff 100%);
      min-height: 100vh;
    }
    h1
    {
      color: #1e40af;
      font-size: 2.5rem;
      margin-bottom: 32px;
      text-align: center;
    }
    .controls
    {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 48px;
    }
    button
    {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover
    {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }
    #output
    {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      font-family: 'SF Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      max-height: 60vh;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<h1>🧙‍♀️ Frieren Archive</h1>

<div class="controls">
  <button onclick="testHealth()">Check API Health</button>
  <button onclick="testNews()">Load News</button>
</div>

<div id="output">Click a button to test Rails API connection...</div>

<script>
  async function testHealth() {
    try {
      const data = await window.frieren.getHealth()
      document.getElementById('output').textContent = JSON.stringify(data, null, 2)
    } catch (error) {
      document.getElementById('output').textContent = `Error: ${error.message}\n\nMake sure Rails server is running on localhost:3000`
    }
  }

  async function testNews()
  {
    try {
      const data = await window.frieren.getNews()
      document.getElementById('output').textContent = JSON.stringify(data, null, 2)
    } catch (error) {
      document.getElementById('output').textContent = `Error: ${error.message}\n\nMake sure Rails server is running on localhost:3000`
    }
  }
</script>
</body>
</html>
